# Moment Server 配置文件

app:
  name: "moment-server"
  host: "0.0.0.0"
  port: 8080
  mode: "debug"  # debug, release, test
  env: "development"

# 本机账号与仓库默认不一致时：复制 config.local.example.yaml 为 config.local.yaml 并只填 database（见该示例文件）
database:
  driver: "mysql"
  host: "localhost"
  port: 3306
  database: "moment"
  username: "root"
  password: "password"
  charset: "utf8mb4"
  max_idle_conns: 10
  max_open_conns: 100
  conn_max_lifetime: 3600  # 秒

redis:
  host: "localhost"
  port: 6379
  password: ""
  db: 0
  pool_size: 10

jwt:
  secret: "your-secret-key-change-in-production"
  access_token_expire: 7200      # 2小时（秒）
  refresh_token_expire: 604800    # 7天（秒）

upload:
  driver: "local"  # local, minio
  local_path: "./uploads"
  max_size: 104857600  # 100MB
  allowed_types:
    - "image/jpeg"
    - "image/png"
    - "image/gif"
    - "audio/mpeg"
    - "audio/wav"
    - "video/mp4"
    - "video/quicktime"

log:
  level: "debug"
  format: "json"
  output: "stdout"  # stdout, file
  file_path: "./logs/server.log"
  max_size: 100    # MB
  max_backups: 7
  max_age: 30      # 天
